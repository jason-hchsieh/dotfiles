name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 5'  # Weekly Friday run
  workflow_dispatch:        # Manual trigger

jobs:
  template-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Install bats
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run template validation tests
        run: bats tests/templates/test_templates.bats

  e2e-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Install bats
        run: brew install bats-core

      - name: Run e2e tests
        run: bats tests/e2e/test_apply.bats

  e2e-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/docker/Dockerfile.ubuntu
          tags: chezmoi-test-ubuntu
          load: true
          cache-from: type=gha,scope=ubuntu
          cache-to: type=gha,mode=max,scope=ubuntu

      - name: Run e2e tests in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/dotfiles:ro" \
            chezmoi-test-ubuntu \
            bash -c "cd /dotfiles && bats tests/e2e/test_apply.bats"

  e2e-arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/docker/Dockerfile.arch
          tags: chezmoi-test-arch
          load: true
          cache-from: type=gha,scope=arch
          cache-to: type=gha,mode=max,scope=arch

      - name: Run e2e tests in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/dotfiles:ro" \
            chezmoi-test-arch \
            bash -c "cd /dotfiles && bats tests/e2e/test_apply.bats"
